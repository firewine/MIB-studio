name: security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      phase:
        description: "scaffold, m1, m2, m3, m4, m5, or m6"
        required: false
        default: scaffold

env:
  MIB_CI_PHASE: ${{ inputs.phase || vars.MIB_CI_PHASE || 'scaffold' }}

jobs:
  python-audit-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python -m pip install pip-audit==2.8.0
      - run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          exceptions_path = Path("artifacts/security/pip_audit_cuda_exceptions.json")
          cmd = ["pip-audit", "--no-deps", "-r", "requirements.txt", "-r", "requirements-dev.txt"]

          exceptions = json.loads(exceptions_path.read_text())
          for vulnerability_id in exceptions.get("ignored_vulnerability_ids", []):
              cmd.extend(["--ignore-vuln", str(vulnerability_id)])

          raise SystemExit(subprocess.call(cmd))
          PY

  python-audit-mlx:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python -m pip install pip-audit==2.8.0
      - run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("requirements-mlx.txt")
          target = Path("requirements-mlx.audit.txt")
          platform_only = {"mlx", "mlx-lm"}
          kept = []
          for raw_line in source.read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#"):
                  kept.append(raw_line)
                  continue
              name = line.split("==", 1)[0].strip().lower()
              if name in platform_only:
                  print(f"Skipping platform-only MLX package in pip-audit resolver: {line}")
                  continue
              kept.append(raw_line)
          target.write_text("\n".join(kept) + "\n")
          PY
          pip-audit --no-deps -r requirements-mlx.audit.txt -r requirements-dev.txt

  model-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python scripts/verify_model_catalog.py --catalog presets/model_catalog.yaml --no-download --json-output artifacts/security/model_manifest_verification.json

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python -m pip install detect-secrets==1.5.0
      - run: detect-secrets scan --all-files

  node-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          import json
          import shutil
          import subprocess
          from pathlib import Path

          package = json.loads(Path("package.json").read_text())
          deps = {}
          deps.update(package.get("dependencies") or {})
          deps.update(package.get("devDependencies") or {})

          Path("artifacts/security").mkdir(parents=True, exist_ok=True)
          components = [
              {
                  "type": "library",
                  "name": name,
                  "version": str(version).lstrip("~^=<> "),
              }
              for name, version in sorted(deps.items())
          ]
          sbom = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.5",
              "version": 1,
              "metadata": {
                  "component": {
                      "type": "application",
                      "name": package.get("name", "mib-studio"),
                      "version": package.get("version", "0.0.0"),
                  }
              },
              "components": components,
          }
          Path("artifacts/security/npm-sbom.json").write_text(json.dumps(sbom, sort_keys=True, indent=2) + "\n")

          if not deps:
              print("No Node dependencies declared; pnpm install/audit skipped and empty SBOM generated.")
              raise SystemExit(0)

          if shutil.which("npm") is None:
              raise SystemExit("Node dependencies exist but npm is unavailable on the runner.")

          subprocess.check_call(["npm", "install", "-g", "pnpm@9.15.0"])
          subprocess.check_call(["pnpm", "install", "--frozen-lockfile"])
          subprocess.check_call(["pnpm", "audit", "--audit-level", "high"])
          PY

  rust-tauri-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ -f src-tauri/Cargo.lock ]; then
            cargo install cargo-audit --locked
            cargo audit --file src-tauri/Cargo.lock
          else
            echo "M0/M1 before Tauri scaffold: src-tauri/Cargo.lock not present."
          fi

  export-secret-scan-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python scripts/scan_export_artifact.py --self-test

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: |
          python scripts/export_openapi.py
          git diff --exit-code schemas/openapi.json

  code-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python scripts/check_file_size.py --config rules/code_shape.json --json-output artifacts/review/file_size_report.json --fail-on-hard-limit
      - run: python scripts/check_import_boundaries.py --json-output artifacts/review/import_boundary_report.json --rules rules/code_shape.json

  pii-holdout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: python scripts/verify_pii_holdout.py --phase "$MIB_CI_PHASE" --json-output artifacts/security/pii_holdout_report.json

  m1-security-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: |
          if [ "$MIB_CI_PHASE" = "scaffold" ]; then
            echo "M1 security smoke is skipped for M0 scaffold."
            exit 0
          fi
          test -d tests/security
          python -m pytest tests/security

  m6-export-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: |
          if [ "$MIB_CI_PHASE" != "m6" ]; then
            echo "M6 export security gate is active only for MIB_CI_PHASE=m6."
            exit 0
          fi
          test -d tests/export
          python -m pytest tests/export
